name: CD - Android

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag, branch, or SHA) to build. Leave blank for default."
        type: string
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: google-play-store
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Sync data
        run: dart tool/sync_data.dart

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Install Fastlane (Android)
        run: |
          cd android
          bundle install

      - name: Decode upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_JKS_B64 }}" | base64 -d > android/upload-keystore.jks

      - name: Write key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat <<EOF > android/key.properties
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=${{ github.workspace }}/android/upload-keystore.jks
          EOF

      - name: Decode Play Store service account key
        run: |
          echo "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > android/service-account-key.json

      - name: Build app bundle
        run: flutter build appbundle --no-tree-shake-icons --release

      - name: Run Fastlane
        env:
          CI: true
        run: |
          cd android
          bundle exec fastlane internal

name: Flutter CI
on:
  push:
    branches:
    - main
  workflow_dispatch:
    
jobs:
  test:
    name: Tests 🧪
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v6
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter pub get

    - run: dart format --set-exit-if-changed .

    - run: flutter analyze .

  build_android:
    name: Build APK 🤖
    runs-on: ubuntu-latest
    needs: test
    steps:

    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter pub get

    # Pull the latest CMS snapshot + prefetch photos so the APK ships with
    # a usable offline baseline. Gitignored output regenerated per build.
    - name: Sync CMS data
      run: dart run tool/sync_data.dart

    - run: flutter build apk

    - uses: actions/upload-artifact@v7
      with:
        name: release-apk
        path: build/app/outputs/apk/release/app-release.apk

  build_web:
    name: Build and deploy web 🕸️
    runs-on: ubuntu-latest
    needs: test
    steps:

    - uses: actions/checkout@v6
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter pub get

    # Pull the latest CMS snapshot + prefetch photos so the first paint on
    # GH Pages doesn't wait on a round-trip to Directus.
    - name: Sync CMS data
      run: dart run tool/sync_data.dart

    - run: flutter build web

    - name: Deploy web app 🚀
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: build/web

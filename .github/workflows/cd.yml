name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compare pubspec version with latest tag
        id: check
        run: |
          CURR=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '\r\n ')
          TAG="v$CURR"
          echo "current=$CURR" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist; will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        id: release
        if: steps.check.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "released=true" >> "$GITHUB_OUTPUT"

  deploy-ios-beta:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy-ios.yml
    with:
      ref: ${{ needs.release.outputs.tag }}
    secrets: inherit

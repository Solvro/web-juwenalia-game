name: juwenalia_app
description: Juwenalia #WrocławRazem

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  mobile_scanner: ^7.2.0
  json_annotation: ^4.11.0
  http: ^1.6.0
  shared_preferences: ^2.5.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  google_fonts: ^8.0.2
  connectivity_plus: ^7.1.1
  flutter_animate: ^4.5.2
  intl: ^0.20.2

  # Modern Flutter stack
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  path_provider: ^2.1.5
  geolocator: ^14.0.2
  flutter_html: ^3.0.0
  flutter_map: ^8.2.0
  latlong2: ^0.9.1
  package_info_plus: ^9.0.0
  material_symbols_icons: ^4.2928.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.0
  json_serializable: ^6.13.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#131313"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  web:
    generate: true
    image_path: "assets/icon/web_icon.png"
    background_color: "#131313"
    theme_color: "#131313"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/data/
    - assets/data/photos/
    - assets/icon/
